version: "3"

vars:
  CLI_DIR: ./cli
  CLI_BIN: "{{.CLI_DIR}}/cbi"
  DATA_DIR: ./data
  OUT_DIR: ./out
  SOURCE_DB: chi-city-data.duckdb
  DOMAIN_CONFIG: "{{.CLI_DIR}}/domain.yaml"
  TARGET_DB: "{{.CLI_DIR}}/chicago_business.duckdb"

tasks:
  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    desc: Build the cbi CLI binary
    dir: "{{.CLI_DIR}}"
    cmds:
      - go build -o cbi .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - cbi

  tidy:
    desc: Run go mod tidy
    dir: "{{.CLI_DIR}}"
    cmds:
      - go mod tidy

  # ---------------------------------------------------------------------------
  # Database Init
  # ---------------------------------------------------------------------------
  init:
    desc: Initialize the knowledge graph database (extensions, schema, indexes, property graph)
    deps: [build]
    dir: "{{.CLI_DIR}}"
    cmds:
      - ./cbi init --config domain.yaml

  # ---------------------------------------------------------------------------
  # Data Conversion
  # ---------------------------------------------------------------------------
  convert:
    desc: Convert source DuckDB data to NDJSON node/edge files
    cmds:
      - npx tsx {{.DATA_DIR}}/to_ndjson.ts --db {{.SOURCE_DB}} --out {{.OUT_DIR}}
    sources:
      - "{{.DATA_DIR}}/to_ndjson.ts"
      - "{{.SOURCE_DB}}"
    generates:
      - "{{.OUT_DIR}}/nodes.ndjson"
      - "{{.OUT_DIR}}/edges.ndjson"

  # ---------------------------------------------------------------------------
  # Ingestion
  # ---------------------------------------------------------------------------
  ingest:nodes:
    desc: Ingest nodes into the knowledge graph
    deps: [build, init]
    dir: "{{.CLI_DIR}}"
    cmds:
      - ./cbi ingest --nodes ../{{.OUT_DIR}}/nodes.ndjson --time {{.TIME}} --batch-size {{.BATCH_SIZE}}
    vars:
      TIME: '{{.TIME | default "2026-03-29"}}'
      BATCH_SIZE: '{{.BATCH_SIZE | default "500"}}'
    preconditions:
      - test -f ../{{.OUT_DIR}}/nodes.ndjson

  ingest:edges:
    desc: Ingest edges into the knowledge graph
    deps: [build, init]
    dir: "{{.CLI_DIR}}"
    cmds:
      - ./cbi ingest --edges ../{{.OUT_DIR}}/edges.ndjson --time {{.TIME}} --batch-size {{.BATCH_SIZE}}
    vars:
      TIME: '{{.TIME | default "2026-03-29"}}'
      BATCH_SIZE: '{{.BATCH_SIZE | default "500"}}'
    preconditions:
      - test -f ../{{.OUT_DIR}}/edges.ndjson

  ingest:
    desc: Ingest both nodes and edges (nodes first)
    cmds:
      - task: ingest:nodes
      - task: ingest:edges

  # ---------------------------------------------------------------------------
  # Full Pipeline
  # ---------------------------------------------------------------------------
  pipeline:
    desc: Run full pipeline — convert, init, ingest
    cmds:
      - task: convert
      - task: init
      - task: ingest

  # ---------------------------------------------------------------------------
  # Query
  # ---------------------------------------------------------------------------
  query:
    desc: "Run a hybrid search query (usage: task query -- \"your search text\")"
    deps: [build]
    dir: "{{.CLI_DIR}}"
    cmds:
      - ./cbi query --text "{{.CLI_ARGS}}" --limit {{.LIMIT}}
    vars:
      LIMIT: '{{.LIMIT | default "10"}}'

  # ---------------------------------------------------------------------------
  # Source Database Exploration
  # ---------------------------------------------------------------------------
  schema:
    desc: Show source database schema
    cmds:
      - duckdb -markdown -c "SHOW ALL TABLES;" {{.SOURCE_DB}}

  sql:
    desc: "Run a SQL query against the source database (usage: task sql -- \"SELECT ...\")"
    cmds:
      - duckdb -markdown -c "{{.CLI_ARGS}}" {{.SOURCE_DB}}

  summarize:
    desc: "Summarize a table or query (usage: task summarize -- city_businesses)"
    cmds:
      - duckdb -markdown -c "SUMMARIZE {{.CLI_ARGS}}" {{.SOURCE_DB}}

  graph:schema:
    desc: Show the knowledge graph database schema
    cmds:
      - duckdb -markdown -c "SHOW ALL TABLES;" {{.TARGET_DB}}
    preconditions:
      - test -f {{.TARGET_DB}}

  graph:sql:
    desc: "Run a SQL query against the knowledge graph (usage: task graph:sql -- \"SELECT ...\")"
    cmds:
      - duckdb -markdown -c "{{.CLI_ARGS}}" {{.TARGET_DB}}
    preconditions:
      - test -f {{.TARGET_DB}}

  graph:stats:
    desc: Show node/edge counts in the knowledge graph
    cmds:
      - duckdb -markdown -c "SELECT node_type, COUNT(*) as count FROM Nodes_Base WHERE is_current GROUP BY 1 ORDER BY 2 DESC; SELECT relationship_type, COUNT(*) as count FROM Edges_Base WHERE is_current GROUP BY 1 ORDER BY 2 DESC;" {{.TARGET_DB}}
    preconditions:
      - test -f {{.TARGET_DB}}

  # ---------------------------------------------------------------------------
  # Browser Compile
  # ---------------------------------------------------------------------------
  compile:
    desc: "Compile a knowledge graph into a browser search app (usage: task compile -- --config test/domain.yaml)"
    dir: ./browser
    cmds:
      - node compile.mjs {{.CLI_ARGS | default "--config ../test/domain.yaml --output dist/"}}

  compile:serve:
    desc: Serve the compiled browser app locally
    dir: ./browser
    cmds:
      - npx serve dist/

  # ---------------------------------------------------------------------------
  # Cleanup
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # UFO Pipeline (PDFs -> Markdown -> entities -> NDJSON -> KG)
  # ---------------------------------------------------------------------------
  ufo:setup:
    desc: Install Python deps for the docling/extraction pipeline
    dir: ./pipeline
    cmds:
      - uv sync

  ufo:convert:
    desc: Convert UFO PDFs to Markdown via Docling
    deps: [ufo:setup]
    cmds:
      - cd pipeline && uv run python -m pipeline.convert --in ../tmpdata/ufodata/Release_1 --out ../out/ufo {{.CLI_ARGS}}

  ufo:videos:
    desc: Sample frames from UFO MP4s and describe each via multimodal LLM
    deps: [ufo:setup]
    cmds:
      - cd pipeline && uv run python -m pipeline.video_describe --in ../tmpdata/ufodata --out ../out/ufo --endpoint {{.ENDPOINT}} --model {{.MODEL}} --frames {{.FRAMES}} {{.CLI_ARGS}}
    vars:
      ENDPOINT: '{{.ENDPOINT | default "http://localhost:8080"}}'
      MODEL:    '{{.MODEL | default "unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q8_K_XL"}}'
      FRAMES:   '{{.FRAMES | default "6"}}'

  ufo:extract:
    desc: Run local-LLM entity/fact extraction over markdown
    deps: [ufo:setup]
    cmds:
      - cd pipeline && uv run python -m pipeline.extract --in ../out/ufo/markdown --out ../out/ufo/extractions --endpoint {{.ENDPOINT}} --model {{.MODEL}} {{.CLI_ARGS}}
    vars:
      ENDPOINT: '{{.ENDPOINT | default "http://localhost:8080"}}'
      MODEL: '{{.MODEL | default "gemma"}}'

  ufo:build:
    desc: Build nodes.ndjson + edges.ndjson from extractions
    deps: [ufo:setup]
    cmds:
      - cd pipeline && uv run python -m pipeline.build_ndjson --in ../out/ufo --out ../out/ufo

  ufo:init:
    desc: Initialize the UFO knowledge-graph DB
    deps: [build]
    dir: "{{.CLI_DIR}}"
    cmds:
      - ./cbi init --config ufo_domain.yaml

  ufo:ingest:
    desc: Ingest UFO nodes + edges into the knowledge graph
    deps: [build, ufo:init]
    dir: "{{.CLI_DIR}}"
    cmds:
      - ./cbi ingest --config ufo_domain.yaml --nodes ../out/ufo/nodes.ndjson --edges ../out/ufo/edges.ndjson --time {{.TIME}} --batch-size {{.BATCH_SIZE}}
    vars:
      TIME: '{{.TIME | default "2026-05-15"}}'
      BATCH_SIZE: '{{.BATCH_SIZE | default "100"}}'
    preconditions:
      - test -f ../out/ufo/nodes.ndjson
      - test -f ../out/ufo/edges.ndjson

  ufo:pipeline:
    desc: Full UFO pipeline — convert, extract, build, init, ingest
    cmds:
      - task: ufo:convert
      - task: ufo:extract
      - task: ufo:build
      - task: ufo:init
      - task: ufo:ingest

  ufo:query:
    desc: "Hybrid search against the UFO KG (usage: task ufo:query -- \"search text\")"
    deps: [build]
    dir: "{{.CLI_DIR}}"
    cmds:
      - ./cbi query --config ufo_domain.yaml --text "{{.CLI_ARGS}}" --limit {{.LIMIT}}
    vars:
      LIMIT: '{{.LIMIT | default "10"}}'

  clean:
    desc: Remove build artifacts and generated data
    cmds:
      - rm -f {{.CLI_BIN}}
      - rm -rf {{.OUT_DIR}}

  clean:db:
    desc: Remove the knowledge graph database (destructive)
    prompt: This will delete {{.TARGET_DB}}. Continue?
    cmds:
      - rm -f {{.TARGET_DB}}
