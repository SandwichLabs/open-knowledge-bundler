<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Search</title>

<!-- Graphology (UMD) + sigma.js -->
<script src="https://cdn.jsdelivr.net/npm/graphology@0.26.0/dist/graphology.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e0e0e6;
  --text-dim: #8b8d9a;
  --accent: #6c8aff;
  --accent-dim: #3d4f8a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

#app {
  display: grid;
  grid-template-columns: 360px 1fr;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

/* Header */
#header {
  grid-column: 1 / -1;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}
#header h1 { font-size: 16px; font-weight: 600; }
#header .stats { font-size: 12px; color: var(--text-dim); }

/* Sidebar */
#sidebar {
  grid-row: 2 / 4;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Search box */
#search-box {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
#search-input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text-dim); }

#search-controls {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  align-items: center;
}
#search-mode {
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
}
#search-status {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: auto;
}

/* Filters */
#filters {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
}
#filters summary {
  cursor: pointer;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.filter-group { margin-bottom: 8px; }
.filter-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  cursor: pointer;
}
.filter-group label .swatch {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  display: inline-block;
}

/* Results list */
#results {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.result-card {
  padding: 10px 12px;
  margin-bottom: 6px;
  border-radius: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
}
.result-card:hover, .result-card.active { border-color: var(--accent); }
.result-card .result-type {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
}
.result-card .result-title {
  font-size: 13px;
  font-weight: 500;
  margin: 2px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.result-card .result-score {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}
.result-card .score-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.result-card .score-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
}
.result-card .score-val {
  font-size: 10px;
  color: var(--text-dim);
  min-width: 32px;
  text-align: right;
}

/* Graph canvas */
#graph-container {
  grid-row: 2;
  position: relative;
  overflow: hidden;
}
#sigma-container { width: 100%; height: 100%; }

/* Detail panel */
#detail {
  grid-column: 2;
  grid-row: 3;
  background: var(--surface);
  border-top: 1px solid var(--border);
  max-height: 240px;
  overflow-y: auto;
  display: none;
}
#detail.open { display: block; }
#detail-inner {
  padding: 12px 20px;
}
#detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
#detail-header h2 { font-size: 14px; font-weight: 600; }
#detail-close {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 18px;
}
#detail-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  font-size: 12px;
}
.detail-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.props-table {
  width: 100%;
  border-collapse: collapse;
}
.props-table td {
  padding: 2px 8px 2px 0;
  vertical-align: top;
}
.props-table td:first-child {
  font-weight: 500;
  color: var(--text-dim);
  white-space: nowrap;
}
.neighbor-list { list-style: none; }
.neighbor-list li {
  padding: 3px 0;
  cursor: pointer;
}
.neighbor-list li:hover { color: var(--accent); }
.neighbor-list .edge-type {
  font-size: 10px;
  color: var(--text-dim);
  margin-right: 4px;
}

/* Loading overlay */
#loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.3s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading h2 { font-size: 18px; margin-bottom: 16px; }
#loading .progress-bar {
  width: 300px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}
#loading .progress-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
  width: 0%;
}
#loading .progress-text {
  font-size: 12px;
  color: var(--text-dim);
}

/* Presets */
#presets {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  max-height: 280px;
  overflow-y: auto;
}
#presets summary {
  cursor: pointer;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.preset-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}
.preset-btn {
  flex: 1;
  text-align: left;
  padding: 6px 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}
.preset-btn:hover { border-color: var(--accent); }
.preset-q, .preset-n {
  padding: 5px 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
}
.preset-q { width: 96px; }
.preset-n { width: 56px; }
#preset-active {
  display: none;
  justify-content: space-between;
  align-items: center;
  padding: 6px 8px;
  background: var(--accent-dim);
  border-radius: 4px;
  margin-top: 6px;
  font-size: 11px;
}
#preset-active.open { display: flex; }
.link-btn {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 11px;
  padding: 0;
  font-family: inherit;
}

/* Empty states */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 13px;
}
</style>
</head>
<body>

<div id="loading">
  <h2>Loading Graph Search</h2>
  <div class="progress-bar"><div class="fill" id="load-progress"></div></div>
  <div class="progress-text" id="load-text">Initializing...</div>
</div>

<div id="app">
  <div id="header">
    <h1 id="title">Graph Search</h1>
    <span class="stats" id="stats"></span>
  </div>

  <div id="sidebar">
    <div id="search-box">
      <input type="text" id="search-input" placeholder="Search the knowledge graph..." disabled>
      <div id="search-controls">
        <select id="search-mode">
          <option value="hybrid">Hybrid</option>
          <option value="semantic">Semantic</option>
          <option value="lexical">Lexical</option>
        </select>
        <span id="search-status"></span>
      </div>
    </div>
    <details id="filters" open>
      <summary>Filters</summary>
      <div id="node-filters" class="filter-group"></div>
      <div id="edge-filters" class="filter-group"></div>
    </details>
    <details id="presets" open>
      <summary>Presets</summary>
      <div id="preset-list"></div>
      <div id="preset-active">
        <span id="preset-active-label"></span>
        <button id="preset-clear" class="link-btn">Clear</button>
      </div>
    </details>
    <div id="results">
      <div class="empty-state">Enter a search query or click a node on the graph.</div>
    </div>
  </div>

  <div id="graph-container">
    <div id="sigma-container"></div>
  </div>

  <div id="detail">
    <div id="detail-inner">
      <div id="detail-header">
        <h2 id="detail-title"></h2>
        <button id="detail-close">&times;</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// Inline force-directed layout (replaces ForceAtlas2 CDN dependency)
// ============================================================================
function forceLayout(graph, iterations = 200) {
  const nodes = [];
  const nodeMap = {};
  graph.forEachNode((id, attrs) => {
    const n = { id, x: attrs.x, y: attrs.y, dx: 0, dy: 0 };
    nodeMap[id] = n;
    nodes.push(n);
  });

  const edges = [];
  graph.forEachEdge((id, attrs, source, target) => {
    edges.push({ source: nodeMap[source], target: nodeMap[target] });
  });

  const area = Math.max(nodes.length * 100, 1000);
  const k = Math.sqrt(area / nodes.length);

  for (let iter = 0; iter < iterations; iter++) {
    const temp = 0.1 * (1 - iter / iterations) * k;

    // Repulsive forces between all node pairs
    for (let i = 0; i < nodes.length; i++) {
      nodes[i].dx = 0;
      nodes[i].dy = 0;
      for (let j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        let dx = nodes[i].x - nodes[j].x;
        let dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const force = (k * k) / dist;
        nodes[i].dx += (dx / dist) * force;
        nodes[i].dy += (dy / dist) * force;
      }
    }

    // Attractive forces along edges
    for (const e of edges) {
      let dx = e.source.x - e.target.x;
      let dy = e.source.y - e.target.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
      const force = (dist * dist) / k;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      e.source.dx -= fx;
      e.source.dy -= fy;
      e.target.dx += fx;
      e.target.dy += fy;
    }

    // Apply with temperature cooling
    for (const n of nodes) {
      const disp = Math.sqrt(n.dx * n.dx + n.dy * n.dy) || 0.01;
      n.x += (n.dx / disp) * Math.min(disp, temp);
      n.y += (n.dy / disp) * Math.min(disp, temp);
    }
  }

  // Write positions back to graph
  for (const n of nodes) {
    graph.setNodeAttribute(n.id, 'x', n.x);
    graph.setNodeAttribute(n.id, 'y', n.y);
  }
}

// ============================================================================
// Inline Web Worker (search engine)
// ============================================================================
const WORKER_SOURCE = `
import { AutoModel, AutoTokenizer, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.2';

env.allowRemoteModels = true;
env.allowLocalModels = false;

const MODEL_ID = 'onnx-community/embeddinggemma-300m-ONNX';
const PROMPTS = { query: 'task: search result | query: ', document: 'title: none | text: ' };

let tokenizer = null;
let model = null;
let EMBED_DIM = 768;
let embeddings = null;
let nodeTexts = [];
let nodeIds = [];

// ---- BM25 index ----
let bm25 = null;

function buildBM25(docs) {
  const k1 = 1.2, b = 0.75;
  const N = docs.length;
  const avgdl = docs.reduce((s, d) => s + d.length, 0) / N || 1;
  const df = {};
  const tfs = [];
  const dls = [];

  for (let i = 0; i < N; i++) {
    const tokens = docs[i].toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
    dls.push(tokens.length);
    const tf = {};
    const seen = {};
    for (const t of tokens) {
      tf[t] = (tf[t] || 0) + 1;
      if (!seen[t]) { df[t] = (df[t] || 0) + 1; seen[t] = true; }
    }
    tfs.push(tf);
  }

  return {
    search(query) {
      const qTokens = query.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
      const scores = new Float64Array(N);
      for (const qt of qTokens) {
        const docFreq = df[qt] || 0;
        if (docFreq === 0) continue;
        const idf = Math.log((N - docFreq + 0.5) / (docFreq + 0.5) + 1);
        for (let i = 0; i < N; i++) {
          const freq = tfs[i][qt] || 0;
          if (freq === 0) continue;
          const norm = freq * (k1 + 1) / (freq + k1 * (1 - b + b * dls[i] / avgdl));
          scores[i] += idf * norm;
        }
      }
      return scores;
    }
  };
}

// ---- Cosine similarity ----
function cosineSimilarities(queryEmb, dbEmb, dim) {
  const n = dbEmb.length / dim;
  const sims = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    const off = i * dim;
    let dot = 0, nq = 0, nd = 0;
    for (let j = 0; j < dim; j++) {
      const qv = queryEmb[j], dv = dbEmb[off + j];
      dot += qv * dv; nq += qv * qv; nd += dv * dv;
    }
    sims[i] = dot / (Math.sqrt(nq) * Math.sqrt(nd) || 1);
  }
  return sims;
}

// ---- RRF fusion ----
function rrfFuse(lexScores, semScores, k = 60) {
  const n = lexScores.length;
  const lexIdx = Array.from({length: n}, (_, i) => i);
  const semIdx = Array.from({length: n}, (_, i) => i);
  lexIdx.sort((a, b) => lexScores[b] - lexScores[a]);
  semIdx.sort((a, b) => semScores[b] - semScores[a]);

  const scores = new Float64Array(n);
  for (let rank = 0; rank < n; rank++) {
    if (lexScores[lexIdx[rank]] > 0) scores[lexIdx[rank]] += 1 / (k + rank + 1);
    if (semScores[semIdx[rank]] > 0) scores[semIdx[rank]] += 1 / (k + rank + 1);
  }
  return scores;
}

// ---- Embedding generation ----
async function generateEmbedding(text) {
  const inputs = await tokenizer([text], { padding: true, truncation: true, max_length: 512 });
  const { sentence_embedding } = await model(inputs);
  return Array.from(sentence_embedding.data.slice(0, EMBED_DIM));
}

// ---- Cache + progress helpers ----
async function fetchWithProgress(url, label, base, scale) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('Failed to fetch ' + url);
  const total = parseInt(res.headers.get('Content-Length') || '0', 10);
  const reader = res.body.getReader();
  const chunks = [];
  let received = 0;
  let lastPost = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    const now = Date.now();
    if (now - lastPost > 80) {
      lastPost = now;
      const mb = (received / 1048576).toFixed(1);
      const totalMb = total ? ' / ' + (total / 1048576).toFixed(1) + ' MB' : ' MB';
      const frac = total > 0 ? received / total : 0;
      self.postMessage({ status: 'loading', progress: base + frac * scale, text: label + ' ' + mb + totalMb });
    }
  }
  const buf = new Uint8Array(received);
  let offset = 0;
  for (const c of chunks) { buf.set(c, offset); offset += c.length; }
  self.postMessage({ status: 'loading', progress: base + scale, text: label + ' done' });
  return buf.buffer;
}

async function getCachedFile(url, label, base, scale) {
  let cache;
  try {
    cache = await caches.open('graph-search-cache');
    const cached = await cache.match(url);
    if (cached) {
      self.postMessage({ status: 'loading', progress: base + scale, text: label + ' (cached)' });
      return await cached.arrayBuffer();
    }
  } catch (e) {}
  const buf = await fetchWithProgress(url, label, base, scale);
  if (cache) try { await cache.put(url, new Response(buf.slice(0))); } catch (e) {}
  return buf;
}

// ---- Message handler ----
self.addEventListener('message', async (e) => {
  const msg = e.data;
  try {
    if (msg.type === 'init') {
      EMBED_DIM = msg.embeddingDim || 768;

      // 1. Graph data — fetch with byte-level progress, then hand off to the main
      //    thread so it can start rendering while we keep loading embeddings + model.
      const graphBuf = await getCachedFile(msg.graphUrl, 'Loading graph', 0.00, 0.15);
      const graphData = JSON.parse(new TextDecoder().decode(new Uint8Array(graphBuf)));
      nodeIds = graphData.nodes.map(n => n.id);
      nodeTexts = graphData.nodes.map(n => n.semantic_text || '');
      EMBED_DIM = (graphData.meta && graphData.meta.embedding_dim) || EMBED_DIM;
      self.postMessage({ status: 'graph_loaded', data: graphData });

      // 2. Embeddings — large; progress-streamed in the worker so the UI stays live.
      const embBuf = await getCachedFile(msg.embeddingsUrl, 'Loading embeddings', 0.15, 0.20);
      embeddings = new Float32Array(embBuf);

      self.postMessage({ status: 'loading', progress: 0.36, text: 'Building lexical index...' });
      bm25 = buildBM25(nodeTexts);

      self.postMessage({ status: 'loading', progress: 0.40, text: 'Loading tokenizer...' });
      tokenizer = await AutoTokenizer.from_pretrained(MODEL_ID, {
        progress_callback: (p) => {
          if (p.progress != null) self.postMessage({ status: 'loading', progress: 0.40 + p.progress * 0.05, text: 'Loading tokenizer...' });
        }
      });

      self.postMessage({ status: 'loading', progress: 0.45, text: 'Loading embedding model (≈200MB on first visit, cached after)...' });
      model = await AutoModel.from_pretrained(MODEL_ID, {
        dtype: 'q8',
        progress_callback: (p) => {
          if (p.progress != null) self.postMessage({ status: 'loading', progress: 0.45 + p.progress * 0.55, text: 'Loading model ' + ((p.progress || 0) * 100).toFixed(0) + '%...' });
        }
      });

      self.postMessage({ status: 'loading', progress: 1.0, text: 'Ready!' });
      self.postMessage({ status: 'ready' });
    }

    else if (msg.type === 'search') {
      const { query, mode, limit } = msg;
      let semScores = null;
      let lexScores = null;

      if (mode === 'semantic' || mode === 'hybrid') {
        const queryEmb = await generateEmbedding(PROMPTS.query + query);
        semScores = cosineSimilarities(queryEmb, embeddings, EMBED_DIM);
      }

      if (mode === 'lexical' || mode === 'hybrid') {
        lexScores = bm25.search(query);
      }

      let finalScores;
      if (mode === 'hybrid') {
        finalScores = rrfFuse(lexScores, semScores);
      } else if (mode === 'semantic') {
        finalScores = semScores;
      } else {
        finalScores = lexScores;
      }

      const indices = Array.from({length: nodeIds.length}, (_, i) => i);
      indices.sort((a, b) => finalScores[b] - finalScores[a]);

      const top = indices.slice(0, limit || 20).filter(i => finalScores[i] > 0);
      const maxScore = top.length > 0 ? finalScores[top[0]] : 1;

      const results = top.map(i => ({
        node_id: nodeIds[i],
        score: finalScores[i],
        normalized_score: finalScores[i] / maxScore,
      }));

      self.postMessage({ status: 'search_complete', data: results });
    }
  } catch (err) {
    self.postMessage({ status: 'error', data: err.message });
  }
});
`;

// ============================================================================
// Main Application
// ============================================================================
(async function main() {
  let graphData = null;
  let sigmaInstance = null;
  let graph = null;
  let selectedNode = null;

  const TYPE_COLORS = [
    '#6c8aff', '#ff6c8a', '#8aff6c', '#ffb86c', '#c78aff',
    '#6cffda', '#ff6cd9', '#d9ff6c', '#6cd9ff', '#ff9a6c',
  ];
  const typeColorMap = {};

  const loadProgress = document.getElementById('load-progress');
  const loadText = document.getElementById('load-text');
  const loadingEl = document.getElementById('loading');

  function setProgress(pct, text) {
    loadProgress.style.width = (pct * 100) + '%';
    if (text) loadText.textContent = text;
  }

  // --- Spawn search worker FIRST. It streams graph.json + embeddings.bin in
  //     the background with byte-level progress events so the main thread
  //     never blocks waiting on the network. ---
  setProgress(0.01, 'Starting worker...');
  var blob = new Blob([WORKER_SOURCE], { type: 'application/javascript' });
  var worker = new Worker(URL.createObjectURL(blob), { type: 'module' });

  var graphLoadedResolve;
  var graphLoadedPromise = new Promise(function(res) { graphLoadedResolve = res; });

  worker.addEventListener('message', function(ev) {
    var msg = ev.data;
    if (msg.status === 'loading') {
      setProgress(msg.progress, msg.text);
    } else if (msg.status === 'graph_loaded') {
      graphLoadedResolve(msg.data);
    } else if (msg.status === 'ready') {
      loadingEl.classList.add('hidden');
      document.getElementById('search-input').disabled = false;
      document.getElementById('search-input').focus();
    } else if (msg.status === 'search_complete') {
      onSearchResults(msg.data);
    } else if (msg.status === 'error') {
      console.error('Worker error:', msg.data);
      document.getElementById('search-status').textContent = 'Error: ' + msg.data;
    }
  });

  worker.addEventListener('error', function(ev) {
    console.error('Worker load error:', ev);
    document.getElementById('load-text').textContent = 'Worker failed to load. Check console.';
  });

  // Fetch manifest first (tiny) to discover the bundle version. We append it
  // as ?v=... to graph.json / embeddings.bin so that regenerating the bundle
  // never serves stale data from the browser Cache API.
  var baseUrl = new URL('./', window.location.href).href;
  setProgress(0.005, 'Reading manifest...');
  var manifest = {};
  try {
    var manifestResp = await fetch(baseUrl + 'manifest.json', { cache: 'no-store' });
    manifest = await manifestResp.json();
  } catch (e) { console.warn('manifest.json fetch failed', e); }
  var bundleVersion = manifest.generated_at || String(Date.now());
  var cacheBust = '?v=' + encodeURIComponent(bundleVersion);
  worker.postMessage({
    type: 'init',
    graphUrl: baseUrl + 'graph.json' + cacheBust,
    embeddingsUrl: baseUrl + 'embeddings.bin' + cacheBust,
  });

  // Block until the worker has finished streaming + parsing graph.json. The
  // embeddings + model continue loading in the background after this resolves.
  graphData = await graphLoadedPromise;

  document.getElementById('title').textContent = graphData.meta.domain_name.replace(/_/g, ' ');
  document.getElementById('stats').textContent =
    graphData.meta.node_count + ' nodes / ' + graphData.meta.edge_count + ' edges';

  // --- Assign colors to node types + a circular type-cluster center
  //     (cheap O(N) scatter; replaces the unusable O(N²)×iter force layout). ---
  const nodeTypes = Object.keys(graphData.config.node_definitions);
  const typeCenters = {};
  nodeTypes.forEach(function(t, i) {
    typeColorMap[t] = TYPE_COLORS[i % TYPE_COLORS.length];
    var angle = (i / Math.max(1, nodeTypes.length)) * Math.PI * 2;
    typeCenters[t] = { x: Math.cos(angle) * 240, y: Math.sin(angle) * 240 };
  });

  const edgeTypes = Object.keys(graphData.config.edge_definitions);

  // --- Build filters from config ---
  const activeNodeTypes = new Set(nodeTypes);
  const activeEdgeTypes = new Set(edgeTypes);

  function renderFilters() {
    const nf = document.getElementById('node-filters');
    nf.innerHTML = '<div style="font-weight:600;font-size:11px;margin-bottom:4px;color:var(--text-dim)">Nodes</div>' +
      nodeTypes.map(function(t) { return '<label>' +
          '<input type="checkbox" data-node-type="' + t + '"' + (activeNodeTypes.has(t) ? ' checked' : '') + '>' +
          '<span class="swatch" style="background:' + typeColorMap[t] + '"></span>' +
          t + '</label>'; }).join('');

    const ef = document.getElementById('edge-filters');
    ef.innerHTML = '<div style="font-weight:600;font-size:11px;margin-bottom:4px;color:var(--text-dim)">Edges</div>' +
      edgeTypes.map(function(t) { return '<label>' +
          '<input type="checkbox" data-edge-type="' + t + '"' + (activeEdgeTypes.has(t) ? ' checked' : '') + '>' +
          t + '</label>'; }).join('');

    nf.addEventListener('change', onFilterChange);
    ef.addEventListener('change', onFilterChange);
  }

  function onFilterChange() {
    activeNodeTypes.clear();
    document.querySelectorAll('#node-filters input:checked').forEach(function(el) {
      activeNodeTypes.add(el.dataset.nodeType);
    });
    activeEdgeTypes.clear();
    document.querySelectorAll('#edge-filters input:checked').forEach(function(el) {
      activeEdgeTypes.add(el.dataset.edgeType);
    });
    applyFilters();
  }

  function applyFilters() {
    if (!graph || !sigmaInstance) return;

    graph.forEachNode(function(id, attrs) {
      graph.setNodeAttribute(id, 'hidden', !activeNodeTypes.has(attrs._type));
    });

    graph.forEachEdge(function(id, attrs, source, target) {
      var srcVisible = !graph.getNodeAttribute(source, 'hidden');
      var tgtVisible = !graph.getNodeAttribute(target, 'hidden');
      var typeVisible = activeEdgeTypes.has(attrs._relType);
      graph.setEdgeAttribute(id, 'hidden', !(srcVisible && tgtVisible && typeVisible));
    });

    sigmaInstance.refresh();
  }

  renderFilters();

  // ==========================================================================
  // Presets — JS ports of cli/cmd/presets.go, run against the in-memory graph
  // ==========================================================================
  var PRESETS = [
    {
      name: 'top-witnesses', label: 'Top witnesses + locations', hasN: true, defaultN: 20,
      desc: 'Top N persons by WITNESSED_BY count, up to 3 incidents each, plus those incidents\' locations.',
      rels: ['WITNESSED_BY','OCCURRED_AT'],
      requires: { rels: ['WITNESSED_BY','OCCURRED_AT'], types: ['Person','Incident'] },
      compute: function(opts) {
        var n = opts.n || 20;
        var perPerson = {};
        graph.forEachEdge(function(eid, attrs, src, tgt) {
          if (attrs._relType !== 'WITNESSED_BY') return;
          if (!perPerson[tgt]) perPerson[tgt] = new Set();
          perPerson[tgt].add(src);
        });
        var topPersons = Object.keys(perPerson)
          .map(function(p){ return {p:p, c:perPerson[p].size}; })
          .sort(function(a,b){ return b.c - a.c; })
          .slice(0, n)
          .map(function(x){ return x.p; });
        var ids = new Set(topPersons);
        var kept = [];
        topPersons.forEach(function(p) {
          var incs = Array.from(perPerson[p]).sort().slice(0, 3);
          incs.forEach(function(i){ ids.add(i); kept.push(i); });
        });
        kept.forEach(function(iid) {
          if (!graph.hasNode(iid)) return;
          graph.forEachOutEdge(iid, function(eid, attrs, src, tgt) {
            if (attrs._relType === 'OCCURRED_AT') ids.add(tgt);
          });
        });
        return ids;
      }
    },
    {
      name: 'fbi-network', label: 'FBI network (Hoover)',
      desc: 'John Edgar Hoover + 1-hop Person/Agency/Incident neighbors (cap 150).',
      rels: null,
      requires: { seeds: ['person:john-edgar-hoover'] },
      compute: function() {
        var seed = 'person:john-edgar-hoover';
        var ids = new Set();
        if (!graph.hasNode(seed)) return ids;
        ids.add(seed);
        var allowed = { Person: 1, Agency: 1, Incident: 1 };
        graph.forEachOutEdge(seed, function(eid, attrs, src, tgt) {
          var t = nodeIndex[tgt]; if (t && allowed[t.type]) ids.add(tgt);
        });
        graph.forEachInEdge(seed, function(eid, attrs, src, tgt) {
          var s = nodeIndex[src]; if (s && allowed[s.type]) ids.add(src);
        });
        if (ids.size > 150) {
          var keep = new Set([seed]);
          var it = ids.values();
          while (keep.size < 150) { var v = it.next(); if (v.done) break; keep.add(v.value); }
          ids = keep;
        }
        return ids;
      }
    },
    {
      name: 'topic-cluster', label: 'Topic cluster', hasQ: true, defaultQ: 'Maury Island',
      desc: 'Incidents whose summary, location_text, or date_text mention the topic, plus 1-hop neighbors.',
      rels: ['WITNESSED_BY','OCCURRED_AT','REPORTED_BY','MENTIONS'],
      requires: { types: ['Incident'], propertyOnType: { type: 'Incident', anyOf: ['summary','location_text','date_text'] } },
      compute: function(opts) {
        var q = String(opts.q || '').toLowerCase();
        if (!q) return new Set();
        var ids = new Set();
        var hits = [];
        for (var i = 0; i < graphData.nodes.length && hits.length < 80; i++) {
          var n = graphData.nodes[i];
          if (n.type !== 'Incident') continue;
          var p = n.properties || {};
          var match = false;
          var fields = ['summary','location_text','date_text'];
          for (var f = 0; f < fields.length && !match; f++) {
            var v = p[fields[f]];
            if (v && String(v).toLowerCase().indexOf(q) !== -1) match = true;
          }
          if (match) { ids.add(n.id); hits.push(n.id); }
        }
        hits.forEach(function(iid) {
          if (!graph.hasNode(iid)) return;
          graph.forEachOutEdge(iid, function(eid, attrs, src, tgt) { ids.add(tgt); });
          graph.forEachInEdge(iid, function(eid, attrs, src, tgt) { ids.add(src); });
        });
        return ids;
      }
    },
    {
      name: 'co-witnesses', label: 'Co-witness clusters', hasN: true, defaultN: 20,
      desc: 'Top N incidents by witness count (≥2 witnesses) plus the witnesses themselves.',
      rels: ['WITNESSED_BY'],
      requires: { rels: ['WITNESSED_BY'] },
      compute: function(opts) {
        var n = opts.n || 20;
        var counts = {};
        graph.forEachEdge(function(eid, attrs, src, tgt) {
          if (attrs._relType !== 'WITNESSED_BY') return;
          counts[src] = (counts[src] || 0) + 1;
        });
        var top = Object.keys(counts)
          .filter(function(k){ return counts[k] >= 2; })
          .sort(function(a,b){ return counts[b] - counts[a]; })
          .slice(0, n);
        var ids = new Set(top);
        top.forEach(function(iid) {
          graph.forEachOutEdge(iid, function(eid, attrs, src, tgt) {
            if (attrs._relType === 'WITNESSED_BY') ids.add(tgt);
          });
        });
        return ids;
      }
    },
    {
      name: 'top-objects', label: 'Top objects + source docs', hasN: true, defaultN: 20,
      desc: 'Top N objects by mentions plus the documents that name them (cap 60 docs).',
      rels: ['MENTIONS'],
      requires: { rels: ['MENTIONS'], types: ['Object','Document'] },
      compute: function(opts) {
        var n = opts.n || 20;
        var top = graphData.nodes
          .filter(function(x){ return x.type === 'Object'; })
          .map(function(x){
            var m = x.properties && x.properties.mentions;
            return { id: x.id, m: (typeof m === 'number') ? m : parseInt(m, 10) || 0 };
          })
          .sort(function(a,b){ return b.m - a.m; })
          .slice(0, n)
          .map(function(x){ return x.id; });
        var ids = new Set(top);
        var docCount = 0;
        for (var i = 0; i < top.length && docCount < 60; i++) {
          var oid = top[i];
          if (!graph.hasNode(oid)) continue;
          graph.forEachInEdge(oid, function(eid, attrs, src, tgt) {
            if (docCount >= 60) return;
            if (attrs._relType !== 'MENTIONS') return;
            if (!ids.has(src)) { ids.add(src); docCount++; }
          });
        }
        return ids;
      }
    },
    {
      name: 'documents-mentions', label: 'Documents → entities', hasN: true, defaultN: 20,
      desc: 'Top N documents by MENTIONS out-degree + the entities they mention (cap 200 entities).',
      rels: ['MENTIONS'],
      requires: { rels: ['MENTIONS'], types: ['Document'] },
      compute: function(opts) {
        var n = opts.n || 20;
        var counts = {};
        graph.forEachEdge(function(eid, attrs, src, tgt) {
          if (attrs._relType !== 'MENTIONS') return;
          var s = nodeIndex[src]; if (!s || s.type !== 'Document') return;
          counts[src] = (counts[src] || 0) + 1;
        });
        var top = Object.keys(counts)
          .sort(function(a,b){ return counts[b] - counts[a]; })
          .slice(0, n);
        var ids = new Set(top);
        var capLeft = 200;
        for (var i = 0; i < top.length && capLeft > 0; i++) {
          var did = top[i];
          if (!graph.hasNode(did)) continue;
          graph.forEachOutEdge(did, function(eid, attrs, src, tgt) {
            if (capLeft <= 0) return;
            if (attrs._relType !== 'MENTIONS') return;
            if (!ids.has(tgt)) { ids.add(tgt); capLeft--; }
          });
        }
        return ids;
      }
    }
  ];

  var activePreset = null;

  function presetApplies(p) {
    var req = p.requires;
    if (!req) return true;
    if (req.types) {
      for (var i = 0; i < req.types.length; i++) {
        if (nodeTypes.indexOf(req.types[i]) === -1) return false;
      }
    }
    if (req.rels) {
      for (var j = 0; j < req.rels.length; j++) {
        if (edgeTypes.indexOf(req.rels[j]) === -1) return false;
      }
    }
    if (req.seeds) {
      // nodeIndex isn't built yet when renderPresets() runs; scan graphData directly.
      for (var k = 0; k < req.seeds.length; k++) {
        var seed = req.seeds[k];
        var hit = false;
        for (var sn = 0; sn < graphData.nodes.length; sn++) {
          if (graphData.nodes[sn].id === seed) { hit = true; break; }
        }
        if (!hit) return false;
      }
    }
    if (req.propertyOnType) {
      var pot = req.propertyOnType;
      var found = false;
      for (var m = 0; m < graphData.nodes.length && !found; m++) {
        var nn = graphData.nodes[m];
        if (nn.type !== pot.type) continue;
        var props = nn.properties || {};
        for (var f = 0; f < pot.anyOf.length; f++) {
          if (props[pot.anyOf[f]] != null) { found = true; break; }
        }
      }
      if (!found) return false;
    }
    return true;
  }

  function renderPresets() {
    var list = document.getElementById('preset-list');
    var applicable = PRESETS.filter(presetApplies);
    if (applicable.length === 0) {
      list.innerHTML = '<div style="color:var(--text-dim);font-size:11px">No presets match this domain’s schema.</div>';
      return;
    }
    list.innerHTML = applicable.map(function(p) {
      var input = '';
      if (p.hasQ) input = '<input type="text" class="preset-q" placeholder="topic..." value="' + escapeHtml(p.defaultQ || '') + '" data-preset="' + p.name + '">';
      else if (p.hasN) input = '<input type="number" class="preset-n" min="1" max="100" value="' + p.defaultN + '" data-preset="' + p.name + '">';
      return '<div class="preset-row">' +
        '<button class="preset-btn" data-preset="' + p.name + '" title="' + escapeHtml(p.desc) + '">' + escapeHtml(p.label) + '</button>' +
        input + '</div>';
    }).join('');
    list.querySelectorAll('.preset-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { runPresetByName(btn.dataset.preset); });
    });
    list.querySelectorAll('.preset-q, .preset-n').forEach(function(inp) {
      inp.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') runPresetByName(inp.dataset.preset);
      });
    });
  }

  function runPresetByName(name) {
    var p = null;
    for (var i = 0; i < PRESETS.length; i++) { if (PRESETS[i].name === name) { p = PRESETS[i]; break; } }
    if (!p) return;
    var opts = {};
    if (p.hasN) {
      var ni = document.querySelector('.preset-n[data-preset="' + name + '"]');
      var v = ni ? parseInt(ni.value, 10) : p.defaultN;
      opts.n = Math.max(1, Math.min(100, isFinite(v) ? v : p.defaultN));
    }
    if (p.hasQ) {
      var qi = document.querySelector('.preset-q[data-preset="' + name + '"]');
      opts.q = qi ? qi.value : (p.defaultQ || '');
    }
    var ids = p.compute(opts);
    applyPreset(p, ids, opts);
  }

  function applyPreset(p, ids, opts) {
    // Clear any active search highlights + the search box so the two modes don't stack.
    clearHighlights();
    document.getElementById('search-input').value = '';
    clearSearchResults();

    activePreset = { preset: p, ids: ids };

    graph.forEachNode(function(id) {
      graph.setNodeAttribute(id, 'hidden', !ids.has(id));
    });
    graph.forEachEdge(function(eid, attrs, src, tgt) {
      var ok = ids.has(src) && ids.has(tgt);
      if (ok && p.rels) ok = p.rels.indexOf(attrs._relType) !== -1;
      graph.setEdgeAttribute(eid, 'hidden', !ok);
    });

    // Quick force layout on the visible subset (small N, cheap) so the
    // preset is legible instead of inheriting the global type-cluster scatter.
    layoutSubgraph(ids, p.rels);
    sigmaInstance.refresh();

    var lbl = p.label;
    if (opts.q) lbl += ' — "' + opts.q + '"';
    if (opts.n) lbl += ' (n=' + opts.n + ')';
    lbl += ' · ' + ids.size + ' nodes';
    document.getElementById('preset-active-label').textContent = lbl;
    document.getElementById('preset-active').classList.add('open');

    // Show a result list of the preset members so they're clickable.
    var resultsEl = document.getElementById('results');
    if (ids.size === 0) {
      resultsEl.innerHTML = '<div class="empty-state">Preset returned no matches.</div>';
      return;
    }
    var members = [];
    ids.forEach(function(id) { members.push(id); });
    members.sort(function(a, b) {
      var ta = (nodeIndex[a] && nodeIndex[a].type) || '';
      var tb = (nodeIndex[b] && nodeIndex[b].type) || '';
      if (ta !== tb) return ta < tb ? -1 : 1;
      return a < b ? -1 : 1;
    });
    resultsEl.innerHTML = members.slice(0, 200).map(function(id) {
      var node = nodeIndex[id]; if (!node) return '';
      var title = node.properties.name || node.properties.legal_name || id;
      return '<div class="result-card" data-node-id="' + id + '">' +
        '<div class="result-type" style="color:' + (typeColorMap[node.type] || '#888') + '">' + node.type + '</div>' +
        '<div class="result-title">' + escapeHtml(title) + '</div></div>';
    }).join('');
    resultsEl.querySelectorAll('.result-card').forEach(function(card) {
      card.addEventListener('click', function() { selectNode(card.dataset.nodeId); });
    });
  }

  function layoutSubgraph(idSet, allowedRels) {
    if (!idSet || idSet.size === 0 || idSet.size > 400) return;
    var sub = new graphology.DirectedGraph();
    idSet.forEach(function(id) {
      if (!graph.hasNode(id)) return;
      var center = typeCenters[graph.getNodeAttribute(id, '_type')] || { x: 0, y: 0 };
      sub.addNode(id, {
        x: center.x + (Math.random() - 0.5) * 60,
        y: center.y + (Math.random() - 0.5) * 60,
      });
    });
    graph.forEachEdge(function(eid, attrs, src, tgt) {
      if (!idSet.has(src) || !idSet.has(tgt)) return;
      if (allowedRels && allowedRels.indexOf(attrs._relType) === -1) return;
      if (!sub.hasNode(src) || !sub.hasNode(tgt)) return;
      if (sub.hasEdge(src, tgt)) return;
      try { sub.addEdge(src, tgt); } catch (e) {}
    });
    forceLayout(sub, 100);
    sub.forEachNode(function(id, attrs) {
      if (graph.hasNode(id)) {
        graph.setNodeAttribute(id, 'x', attrs.x);
        graph.setNodeAttribute(id, 'y', attrs.y);
      }
    });
  }

  function clearPreset() {
    activePreset = null;
    document.getElementById('preset-active').classList.remove('open');
    applyFilters(); // restore visibility from filter checkboxes
    clearSearchResults();
  }

  document.getElementById('preset-clear').addEventListener('click', clearPreset);
  renderPresets();

  // --- Build Graphology graph ---
  setProgress(0.04, 'Building graph...');
  graph = new graphology.DirectedGraph();

  var nodeIndex = {};
  graphData.nodes.forEach(function(n, i) { nodeIndex[n.id] = { id: n.id, type: n.type, properties: n.properties, semantic_text: n.semantic_text, _index: i }; });

  for (var ni = 0; ni < graphData.nodes.length; ni++) {
    var n = graphData.nodes[ni];
    var center = typeCenters[n.type] || { x: 0, y: 0 };
    graph.addNode(n.id, {
      label: n.properties.name || n.properties.legal_name || n.properties.type_name || n.id,
      x: center.x + (Math.random() - 0.5) * 120,
      y: center.y + (Math.random() - 0.5) * 120,
      size: 4,
      color: typeColorMap[n.type] || '#888',
      _type: n.type,
    });
  }

  for (var ei = 0; ei < graphData.edges.length; ei++) {
    var e = graphData.edges[ei];
    if (graph.hasNode(e.source) && graph.hasNode(e.target)) {
      try {
        graph.addEdgeWithKey(e.id, e.source, e.target, {
          label: e.type,
          _relType: e.type,
          size: 1,
          color: '#444',
        });
      } catch (ex) {} // skip duplicate edges
    }
  }

  // Scale node size by degree
  graph.forEachNode(function(id) {
    graph.setNodeAttribute(id, 'size', 3 + Math.sqrt(graph.degree(id)) * 2);
  });

  // --- Render sigma.js ---
  // Initial positions come from the cheap type-cluster scatter above (O(N)).
  // The full O(N²) force layout would freeze the tab for many minutes at 18k
  // nodes; we instead run a small force layout on the visible subset whenever
  // a preset is applied (see applyPreset).
  setProgress(0.06, 'Rendering graph...');
  var container = document.getElementById('sigma-container');
  sigmaInstance = new Sigma(graph, container, {
    renderLabels: true,
    labelRenderedSizeThreshold: 8,
    labelSize: 12,
    labelColor: { color: '#ccc' },
    defaultEdgeColor: '#2a2d3a',
    defaultEdgeType: 'arrow',
    edgeLabelSize: 10,
  });

  // --- Sigma click handlers ---
  sigmaInstance.on('clickNode', function(event) {
    selectNode(event.node);
  });

  sigmaInstance.on('clickStage', function() {
    clearSelection();
  });

  // --- Search input ---
  var searchTimeout = null;
  var searchInput = document.getElementById('search-input');
  var searchMode = document.getElementById('search-mode');

  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    var q = searchInput.value.trim();
    if (activePreset) {
      activePreset = null;
      document.getElementById('preset-active').classList.remove('open');
      applyFilters();
    }
    if (q.length < 2) {
      clearSearchResults();
      return;
    }
    document.getElementById('search-status').textContent = 'Searching...';
    searchTimeout = setTimeout(function() {
      worker.postMessage({
        type: 'search',
        query: q,
        mode: searchMode.value,
        limit: 20,
      });
    }, 600);
  });

  // --- Search results rendering ---
  function onSearchResults(results) {
    document.getElementById('search-status').textContent =
      results.length > 0 ? results.length + ' results' : 'No results';

    var resultsEl = document.getElementById('results');
    if (results.length === 0) {
      resultsEl.innerHTML = '<div class="empty-state">No results found.</div>';
      clearHighlights();
      return;
    }

    resultsEl.innerHTML = results.map(function(r) {
      var node = nodeIndex[r.node_id];
      if (!node) return '';
      var title = node.properties.name || node.properties.legal_name || node.id;
      return '<div class="result-card" data-node-id="' + r.node_id + '">' +
        '<div class="result-type" style="color:' + (typeColorMap[node.type] || '#888') + '">' + node.type + '</div>' +
        '<div class="result-title">' + escapeHtml(title) + '</div>' +
        '<div class="result-score">' +
          '<div class="score-bar"><div class="fill" style="width:' + (r.normalized_score * 100).toFixed(0) + '%"></div></div>' +
          '<span class="score-val">' + (r.normalized_score * 100).toFixed(0) + '%</span>' +
        '</div></div>';
    }).join('');

    resultsEl.querySelectorAll('.result-card').forEach(function(card) {
      card.addEventListener('click', function() {
        selectNode(card.dataset.nodeId);
      });
    });

    highlightResults(results);
  }

  function clearSearchResults() {
    document.getElementById('results').innerHTML =
      '<div class="empty-state">Enter a search query or click a node on the graph.</div>';
    document.getElementById('search-status').textContent = '';
    clearHighlights();
  }

  // --- Graph highlighting ---
  var savedColors = {};
  var savedSizes = {};

  function highlightResults(results) {
    clearHighlights();
    var resultIds = new Set(results.map(function(r) { return r.node_id; }));

    graph.forEachNode(function(id, attrs) {
      savedColors[id] = attrs.color;
      savedSizes[id] = attrs.size;
      if (!resultIds.has(id)) {
        graph.setNodeAttribute(id, 'color', '#222');
        graph.setNodeAttribute(id, 'size', 2);
      } else {
        graph.setNodeAttribute(id, 'size', attrs.size + 3);
      }
    });

    sigmaInstance.refresh();
  }

  function clearHighlights() {
    Object.keys(savedColors).forEach(function(id) {
      if (graph.hasNode(id)) {
        graph.setNodeAttribute(id, 'color', savedColors[id]);
        graph.setNodeAttribute(id, 'size', savedSizes[id] || 4);
      }
    });
    savedColors = {};
    savedSizes = {};
    if (sigmaInstance) sigmaInstance.refresh();
  }

  // --- Node selection + detail panel ---
  function selectNode(nodeId) {
    selectedNode = nodeId;
    var node = nodeIndex[nodeId];
    if (!node) return;

    document.querySelectorAll('.result-card').forEach(function(c) { c.classList.remove('active'); });
    var activeCard = document.querySelector('.result-card[data-node-id="' + nodeId + '"]');
    if (activeCard) activeCard.classList.add('active');

    // Center camera
    var nodePos = sigmaInstance.getNodeDisplayData(nodeId);
    if (nodePos) {
      sigmaInstance.getCamera().animate({ x: nodePos.x, y: nodePos.y, ratio: 0.5 }, { duration: 300 });
    }

    // Build detail panel
    var defs = graphData.config.node_definitions[node.type];
    var displayFields = defs ? defs.display_fields : Object.keys(node.properties);

    var propsHtml = displayFields
      .filter(function(f) { return node.properties[f] != null; })
      .map(function(f) { return '<tr><td>' + escapeHtml(f) + '</td><td>' + escapeHtml(String(node.properties[f])) + '</td></tr>'; })
      .join('');

    // Neighbors
    var neighbors = [];
    if (graph.hasNode(nodeId)) {
      graph.forEachOutEdge(nodeId, function(edge, attrs, src, tgt) {
        var tgtNode = nodeIndex[tgt];
        neighbors.push({ direction: 'out', edgeType: attrs._relType, nodeId: tgt,
          label: tgtNode ? (tgtNode.properties.name || tgtNode.properties.legal_name || tgt) : tgt,
          nodeType: tgtNode ? tgtNode.type : '' });
      });
      graph.forEachInEdge(nodeId, function(edge, attrs, src, tgt) {
        var srcNode = nodeIndex[src];
        neighbors.push({ direction: 'in', edgeType: attrs._relType, nodeId: src,
          label: srcNode ? (srcNode.properties.name || srcNode.properties.legal_name || src) : src,
          nodeType: srcNode ? srcNode.type : '' });
      });
    }

    var neighborsHtml = neighbors.length > 0
      ? '<ul class="neighbor-list">' + neighbors.map(function(nb) {
          return '<li data-node-id="' + nb.nodeId + '">' +
            '<span class="edge-type">' + (nb.direction === 'out' ? '&rarr;' : '&larr;') + ' ' + nb.edgeType + '</span>' +
            '<span style="color:' + (typeColorMap[nb.nodeType] || '#888') + '">' + escapeHtml(nb.label) + '</span></li>';
        }).join('') + '</ul>'
      : '<div style="color:var(--text-dim)">No connections</div>';

    document.getElementById('detail-title').textContent =
      (node.properties.name || node.properties.legal_name || nodeId) + ' (' + node.type + ')';
    document.getElementById('detail-content').innerHTML =
      '<div class="detail-section"><h3>Properties</h3>' +
      '<table class="props-table">' + (propsHtml || '<tr><td colspan="2" style="color:var(--text-dim)">None</td></tr>') + '</table></div>' +
      '<div class="detail-section"><h3>Connections (' + neighbors.length + ')</h3>' + neighborsHtml + '</div>';

    document.getElementById('detail').classList.add('open');

    document.querySelectorAll('#detail .neighbor-list li').forEach(function(li) {
      li.addEventListener('click', function() { selectNode(li.dataset.nodeId); });
    });
  }

  function clearSelection() {
    selectedNode = null;
    document.getElementById('detail').classList.remove('open');
    document.querySelectorAll('.result-card').forEach(function(c) { c.classList.remove('active'); });
  }

  document.getElementById('detail-close').addEventListener('click', clearSelection);

  function escapeHtml(str) {
    var el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }
})();
</script>
</body>
</html>
