<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>cbi · knowledge graph search</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --border:#30363d; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:14px 22px; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:center; }
  header h1 { margin:0; font-size:15px; font-weight:600; color:var(--muted); letter-spacing:0.05em; text-transform:uppercase; }
  header .stats { color:var(--muted); font-size:13px; }
  main { display:grid; grid-template-columns: 1fr 360px; gap:0; height:calc(100vh - 49px); }
  #left { padding:18px 22px; overflow-y:auto; }
  #right { border-left:1px solid var(--border); padding:18px 22px; overflow-y:auto; background:#0a0d12; }
  input[type=text] { width:100%; padding:11px 14px; font-size:15px; background:var(--panel);
                     color:var(--fg); border:1px solid var(--border); border-radius:6px; outline:none; }
  input[type=text]:focus { border-color:var(--accent); }
  .row { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
  select, button { padding:9px 12px; background:var(--panel); color:var(--fg);
                   border:1px solid var(--border); border-radius:6px; font-size:13px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  .hit { padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .hit:hover { background:#11161e; }
  .hit .ntype { display:inline-block; font-size:11px; padding:2px 7px; border-radius:3px;
                background:#22272e; color:var(--muted); margin-right:8px; }
  .hit .name { font-size:14px; }
  .hit .meta { color:var(--muted); font-size:12px; margin-top:4px; }
  .hit .score { float:right; color:var(--muted); font-size:11px; font-family:monospace; }
  #right h2 { margin:0 0 12px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  pre { background:#11161e; padding:10px; border-radius:6px; font-size:12px; overflow-x:auto; color:#c9d1d9; }
  .edge { padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .edge .rel { color:var(--accent); font-family:monospace; font-size:11px; }
  .edge .arrow { color:var(--muted); margin:0 6px; }
  .examples { color:var(--muted); font-size:12px; margin-top:8px; }
  .examples span { cursor:pointer; padding:2px 8px; margin-right:6px; background:var(--panel);
                   border:1px solid var(--border); border-radius:12px; display:inline-block; margin-bottom:4px; }
  .examples span:hover { color:var(--accent); border-color:var(--accent); }
  .loading { color:var(--muted); font-size:13px; padding:10px 0; }
  .err { color:#ff7b72; font-size:13px; padding:10px 0; }
</style>
</head>
<body>
<header>
  <h1>cbi knowledge graph</h1>
  <span class="stats" id="stats">loading…</span>
</header>
<main>
  <section id="left">
    <div class="row">
      <input id="q" type="text" placeholder="Search the corpus (semantic + lexical)…" autofocus>
      <select id="limit"><option>10</option><option>25</option><option>50</option><option>100</option></select>
      <button id="go">Search</button>
    </div>
    <div class="examples" id="examples">
      <span>Tic Tac UAP Navy pilot</span>
      <span>Maury Island 1947 slag debris</span>
      <span>Kenneth Arnold flying saucers</span>
      <span>FBI Hoover memo</span>
      <span>thermal infrared orb water</span>
      <span>Persian Gulf 2020 drones</span>
    </div>
    <div id="results"></div>
  </section>
  <aside id="right">
    <h2>Neighborhood</h2>
    <div id="detail" class="loading">Select a result to see its neighborhood.</div>
  </aside>
</main>

<script>
const $ = (id) => document.getElementById(id);

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}

function fmtNode(r) {
  const p = r.properties || {};
  const name = p.name || p.title || p.summary || r.node_id;
  return { name, role: p.role, mentions: p.mentions };
}

async function search() {
  const text = $('q').value.trim();
  if (!text) return;
  const limit = $('limit').value;
  const results = $('results');
  results.innerHTML = '<div class="loading">searching…</div>';
  try {
    const rows = await api(`/api/query?text=${encodeURIComponent(text)}&limit=${limit}`);
    if (!rows || rows.length === 0) {
      results.innerHTML = '<div class="loading">no results</div>';
      return;
    }
    results.innerHTML = '';
    for (const r of rows) {
      const { name, role, mentions } = fmtNode(r);
      const el = document.createElement('div');
      el.className = 'hit';
      el.innerHTML = `
        <span class="score">${(r.rrf_score ?? 0).toFixed(4)}</span>
        <span class="ntype">${r.node_type}</span>
        <span class="name">${escapeHtml(name).slice(0, 140)}</span>
        <div class="meta">
          ${role ? `<em>${escapeHtml(role)}</em> · ` : ''}
          ${mentions ? `${mentions} mentions · ` : ''}
          <code>${r.node_id}</code>
        </div>`;
      el.onclick = () => loadNeighborhood(r.node_id);
      results.appendChild(el);
    }
  } catch (e) {
    results.innerHTML = `<div class="err">${escapeHtml(String(e))}</div>`;
  }
}

async function loadNeighborhood(nodeId) {
  const det = $('detail');
  det.innerHTML = '<div class="loading">loading…</div>';
  try {
    const data = await api(`/api/node?id=${encodeURIComponent(nodeId)}`);
    const { node, edges } = data;
    const p = node.properties || {};
    let html = `<div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--muted)">${node.node_type}</div>
      <div style="font-size:15px;font-weight:600;margin:4px 0">${escapeHtml(p.name || p.title || node.node_id)}</div>
      <div style="font-size:11px;color:var(--muted);font-family:monospace">${node.node_id}</div>
    </div>
    <pre>${escapeHtml(JSON.stringify(p, null, 2))}</pre>`;
    if (edges && edges.length) {
      html += `<h2 style="margin-top:18px">Edges (${edges.length})</h2>`;
      for (const e of edges) {
        const other = e.other_props || {};
        const otherName = other.name || other.title || e.other_id;
        html += `<div class="edge">
          <span class="rel">${e.direction === 'out' ? '→' : '←'} ${e.relationship_type}</span>
          <span class="arrow">·</span>
          <span class="ntype">${e.other_type}</span>
          ${escapeHtml(otherName).slice(0, 80)}
        </div>`;
      }
    }
    det.innerHTML = html;
  } catch (e) {
    det.innerHTML = `<div class="err">${escapeHtml(String(e))}</div>`;
  }
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

$('go').onclick = search;
$('q').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
$('examples').addEventListener('click', e => {
  if (e.target.tagName === 'SPAN') { $('q').value = e.target.textContent; search(); }
});

api('/api/stats').then(s => {
  $('stats').textContent = `${s.domain} · ${s.nodes.toLocaleString()} nodes · ${s.edges.toLocaleString()} edges`;
}).catch(() => {});
</script>
</body>
</html>
